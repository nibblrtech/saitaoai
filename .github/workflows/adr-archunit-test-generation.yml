name: Build ArchUnit Tests From ADR Change

on:
  workflow_dispatch:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/decisions/**"

jobs:
  generate-adr-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      copilot-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Copilot CLI
        run: npm install -g @github/copilot

      - name: Detect changed ADR files
        id: changed_adrs
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_SHA="${{ github.event.before }}"
          AFTER_SHA="${{ github.sha }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            mapfile -t ADR_FILES < <(git ls-files 'docs/decisions/*.md')
          else
            if [[ -z "${BEFORE_SHA}" || "${BEFORE_SHA}" == "0000000000000000000000000000000000000000" ]]; then
              mapfile -t ADR_FILES < <(git diff --name-only HEAD~1 "${AFTER_SHA}" -- 'docs/decisions/*.md')
            else
              mapfile -t ADR_FILES < <(git diff --name-only "${BEFORE_SHA}" "${AFTER_SHA}" -- 'docs/decisions/*.md')
            fi
          fi

          if [[ ${#ADR_FILES[@]} -eq 0 ]]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          {
            echo "adr_files<<EOF"
            printf '%s\n' "${ADR_FILES[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Generate or update ArchUnit tests with Copilot
        if: steps.changed_adrs.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_TOKEN: ${{ github.token }}
          ADR_FILES: ${{ steps.changed_adrs.outputs.adr_files }}
        shell: bash
        run: |
          set -euo pipefail

          # Ensure no stale COPILOT_GITHUB_TOKEN value can override native token auth.
          unset COPILOT_GITHUB_TOKEN || true

          # Fast preflight to fail with a clear auth error before processing ADR files.
          copilot -p "Reply with: auth-ok" --allow-tool=none --no-ask-user >/dev/null

          while IFS= read -r ADR_FILE; do
            [[ -z "$ADR_FILE" ]] && continue

            DECISION_NAME="$(basename "$ADR_FILE" .md)"
            TARGET_TEST_FILE="tests/${DECISION_NAME}.test.ts"

            PROMPT="look at the Compliance Constraints of the checked in file ${ADR_FILE}. create or update the set of arch unit tests for that component. put the tests under the tests folder, named: ${TARGET_TEST_FILE}. keep tests in TypeScript using vitest and @nielspeter/ts-archunit patterns from this repository. preserve existing tests and only modify/create ${TARGET_TEST_FILE} for this ADR."

            copilot -p "$PROMPT" \
              --allow-tool=write \
              --allow-tool='shell(cat:*)' \
              --allow-tool='shell(ls:*)' \
              --allow-tool='shell(find:*)' \
              --allow-tool='shell(grep:*)' \
              --allow-tool='shell(node:*)' \
              --allow-tool='shell(npm:*)' \
              --allow-tool='shell(npx:*)' \
              --allow-tool='shell(which:*)' \
              --allow-tool='shell(head:*)' \
              --allow-tool='shell(tail:*)' \
              --allow-tool='shell(env:*)' \
              --allow-tool='shell(pwd:*)' \
              --allow-tool='shell(whoami:*)' \
              --allow-tool='shell(echo:*)' \
              --allow-tool='shell(true:*)' \
              --allow-tool='shell(git:*)' \
              --no-ask-user
          done <<< "$ADR_FILES"

      - name: Run test suite
        if: steps.changed_adrs.outputs.has_changes == 'true'
        run: npm test

      - name: Detect test changes
        if: steps.changed_adrs.outputs.has_changes == 'true'
        id: detect_changes
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet -- tests; then
            echo "tests_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "tests_changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request for generated tests
        if: steps.changed_adrs.outputs.has_changes == 'true' && steps.detect_changes.outputs.tests_changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
          commit-message: "test: generate ArchUnit tests from ADR compliance constraints"
          branch: "copilot/adr-archunit-tests-${{ github.run_id }}"
          title: "test: update ArchUnit tests from ADR changes"
          body: |
            This PR was generated automatically from ADR changes under docs/decisions.

            Generated updates:
            - Created or updated one test file per changed ADR in tests/.
            - Validated tests via npm test.

            Review focus:
            - Coverage of Compliance Constraints section
            - Alignment with existing architecture boundaries
          add-paths: |
            tests/*.test.ts
            :(glob)tests/**/*.test.ts
